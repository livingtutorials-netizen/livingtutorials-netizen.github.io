document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

atin */\n@font-face {\n  font-family: 'Nunito Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"0d8d6ed7-3181-4cc7-b224-598214dc4eef\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    * { box-sizing: border-box; }\n    html, body {\n      margin: 0;\n      min-height: 100%;\n      /* Kill the rubber-band/bounce that otherwise reveals what's behind. */\n      overscroll-behavior: none;\n    }\n    body {\n      /* Matches the gradient's end colour, so any residual overscroll on\n         browsers that ignore overscroll-behavior still looks seamless. */\n      background: #f3ecd9;\n      font-family: 'Nunito Sans', system-ui, sans-serif;\n      -webkit-font-smoothing: antialiased;\n    }\n\n    /* Entrance slides content up. Deliberately animates transform ONLY (no\n       opacity) so content is never invisible if the animation clock stalls\n       or motion is unavailable — it just doesn't slide. */\n    @keyframes flUp {\n      from { transform: translateY(18px); }\n      to   { transform: none; }\n    }\n    @keyframes drift {\n      0%, 100% { transform: translate(0, 0); }\n      50%       { transform: translate(14px, -16px); }\n    }\n    @keyframes pulseRing {\n      0%   { box-shadow: 0 0 0 0   rgba(91,138,95,.45); }\n      100% { box-shadow: 0 0 0 18px rgba(91,138,95,0); }\n    }\n    /* The accent \"tab\" of a live trip breathes to draw the eye. */\n    @keyframes nowGlow {\n      0%, 100% { box-shadow: 0 0 5px 0  rgba(91,138,95,.55); }\n      50%      { box-shadow: 0 0 15px 3px rgba(91,138,95,.95); }\n    }\n    @keyframes nowBadge {\n      0%, 100% { opacity: 1; }\n      50%      { opacity: .62; }\n    }\n\n    /* ── page shell ── */\n    .page {\n      --accent: #5b8a5f;\n      position: relative;\n      min-height: 100vh;\n      overflow: hidden;\n      background: linear-gradient(180deg, #fdf8ee, #f3ecd9);\n      display: flex;\n      justify-content: center;\n      padding: clamp(34px,7vw,68px) clamp(20px,5vw,30px);\n    }\n\n    /* ── background blobs ── */\n    .blob {\n      position: absolute;\n      border-radius: 50%;\n      pointer-events: none;\n    }\n    .blob-1 {\n      top: 6%; left: -40px;\n      width: 130px; height: 130px;\n      background: #cfe0c4; opacity: .5;\n      animation: drift 8s ease-in-out infinite;\n    }\n    .blob-2 {\n      top: 40%; right: -56px;\n      width: 170px; height: 170px;\n      background: #f3d9c0; opacity: .5;\n      animation: drift 11s ease-in-out infinite reverse;\n    }\n    .blob-3 {\n      bottom: 4%; left: 8%;\n      width: 90px; height: 90px;\n      background: #dce7d2; opacity: .55;\n      animation: drift 9.5s ease-in-out infinite;\n    }\n\n    /* ── content column ── */\n    .content {\n      position: relative;\n      z-index: 1;\n      width: 100%;\n      max-width: 460px;\n    }\n\n    /* ── language switch ── */\n    .lang-switch {\n      display: flex;\n      flex-wrap: wrap;\n      justify-content: flex-end;\n      gap: 6px;\n      margin-bottom: 18px;\n      animation: flUp .6s ease both;\n    }\n    .lang-switch button {\n      font-family: 'Nunito Sans', sans-serif;\n      font-weight: 700;\n      font-size: 13px;\n      color: #56624f;\n      background: rgba(255,255,255,.7);\n      border: 1px solid rgba(91,138,95,.25);\n      border-radius: 20px;\n      padding: 8px 15px;\n      min-height: 40px;\n      cursor: pointer;\n      transition: background .15s, color .15s, border-color .15s;\n    }\n    .lang-switch button:hover { background: #fff; }\n    .lang-switch button[aria-pressed=\"true\"] {\n      color: #fff;\n      background: var(--accent, #5b8a5f);\n      border-color: var(--accent, #5b8a5f);\n    }\n\n    /* Row under the language switcher: MT pill on the left, regional\n       variants on the right. Collapses to nothing when both are hidden. */\n    .lang-subrow {\n      display: flex;\n      align-items: center;\n      gap: 8px;\n    }\n\n    /* ── regional-variant sub-toggle (简体/繁體, Indonesia/Melayu) ── */\n    .variant-switch {\n      display: flex;\n      flex-wrap: wrap;\n      justify-content: flex-end;\n      gap: 6px;\n      margin: -8px 0 16px auto;\n    }\n    .variant-switch button {\n      font-family: 'Nunito Sans', sans-serif;\n      font-weight: 700;\n      font-size: 11.5px;\n      color: #6f7a67;\n      background: transparent;\n      border: 1px solid rgba(91,138,95,.22);\n      border-radius: 14px;\n      padding: 5px 11px;\n      min-height: 32px;\n      cursor: pointer;\n      transition: background .15s, color .15s, border-color .15s;\n    }\n    .variant-switch button:hover { background: rgba(255,255,255,.6); }\n    .variant-switch button[aria-pressed=\"true\"] {\n      color: #fff;\n      background: var(--accent, #5b8a5f);\n      border-color: var(--accent, #5b8a5f);\n    }\n\n    /* ── hero ── */\n    .hero {\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n      text-align: center;\n      gap: 16px;\n      animation: flUp .6s ease both;\n    }\n    .avatar {\n      width: 112px; height: 112px;\n      border-radius: 32px;\n      background: #ece3d2;\n      background-image: repeating-linear-gradient(45deg,\n        rgba(91,138,95,.18) 0 8px, transparent 8px 16px);\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      font: 600 10px ui-monospace, monospace;\n      color: #7e8a72;\n      animation: pulseRing 2.6s ease-out infinite;\n    }\n    .name {\n      margin: 0;\n      font-family: 'Fredoka', sans-serif;\n      font-weight: 600;\n      font-size: clamp(34px, 9vw, 42px);\n      color: #2f4a3a;\n    }\n    .bio {\n      margin: 0;\n      max-width: 360px;\n      background: #fff;\n      border-radius: 20px;\n      padding: 16px 18px;\n      box-shadow: 0 8px 24px rgba(57,71,59,.09);\n      font-size: 15px;\n      line-height: 1.6;\n      color: #56624f;\n    }\n\n    /* ── socials ── */\n    .socials {\n      display: flex;\n      flex-direction: column;\n      gap: 12px;\n      margin-top: 26px;\n      animation: flUp .6s ease both;\n      animation-delay: .08s;\n    }\n    .social-btn {\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      gap: 10px;\n      padding: 16px;\n      border-radius: 16px;\n      text-decoration: none;\n      font-weight: 700;\n      font-size: 15px;\n      color: #fff;\n      transition: transform .18s, box-shadow .18s;\n    }\n    .social-btn-x    { background: #20242b; box-shadow: 0 6px 16px rgba(32,36,43,.22); }\n    .social-btn-tg   { background: #3fa0c4; box-shadow: 0 6px 16px rgba(63,160,196,.28); }\n    .social-btn-bsky { background: #4a9eff; box-shadow: 0 6px 16px rgba(74,158,255,.3); }\n\n    .social-btn-x:hover    { transform: translateY(-3px); box-shadow: 0 12px 24px rgba(32,36,43,.3); }\n    .social-btn-tg:hover   { transform: translateY(-3px); box-shadow: 0 12px 24px rgba(63,160,196,.38); }\n    .social-btn-bsky:hover { transform: translateY(-3px); box-shadow: 0 12px 24px rgba(74,158,255,.4); }\n\n    /* ── fursuit credit ── */\n    .fursuit-credit {\n      display: inline-flex;\n      align-items: center;\n      gap: 8px;\n      padding: 8px 14px;\n      background: rgba(255,255,255,.75);\n      border: 1px solid rgba(91,138,95,.22);\n      border-radius: 20px;\n      text-decoration: none;\n      font-size: 13px;\n      color: #56624f;\n      transition: transform .18s, box-shadow .18s, background .18s;\n    }\n    .fursuit-credit:hover {\n      transform: translateY(-2px);\n      background: #fff;\n      box-shadow: 0 8px 18px rgba(57,71,59,.12);\n    }\n    .fursuit-credit strong { color: #2f4a3a; font-weight: 700; }\n    .fursuit-credit .fc-icon { font-size: 15px; line-height: 1; }\n    .fursuit-credit .fc-arrow { width: 13px; height: 13px; color: var(--accent, #5b8a5f); flex: none; }\n\n    /* ── languages spoken ── */\n    .lang-heading {\n      margin: 30px 0 0;\n      font-family: 'Fredoka', sans-serif;\n      font-weight: 600;\n      font-size: 23px;\n      color: #2f4a3a;\n      animation: flUp .6s ease both;\n    }\n    .lang-list {\n      display: flex;\n      flex-wrap: wrap;\n      gap: 10px;\n      margin-top: 11px;\n    }\n    .lang-item {\n      flex: 1 1 190px;\n      display: flex;\n      align-items: center;\n      gap: 11px;\n      background: #fff;\n      border-radius: 14px;\n      padding: 11px 13px;\n      box-shadow: 0 6px 20px rgba(57,71,59,.08);\n    }\n    .lang-flag { font-size: 22px; flex: none; }\n    .lang-meta {\n      flex: 1; min-width: 0;\n      display: flex; flex-direction: column; gap: 5px;\n    }\n    .lang-name {\n      font-family: 'Fredoka', sans-serif;\n      font-weight: 600;\n      font-size: 15px;\n      line-height: 1;\n      color: #2f4a3a;\n    }\n    .lang-row { display: flex; align-items: center; gap: 8px; }\n    .lang-level { font-size: 11.5px; color: #6f7a67; }\n    /* Dot meter: universally readable proficiency. */\n    .lang-dots { display: flex; gap: 4px; flex: none; }\n    .lang-dots i { width: 8px; height: 8px; border-radius: 50%; background: #e0e7d8; }\n    .lang-dots i.on { background: var(--accent, #5b8a5f); }\n\n    /* ── travel ── */\n    .travel-heading {\n      margin: 34px 0 4px;\n      font-family: 'Fredoka', sans-serif;\n      font-weight: 600;\n      font-size: 23px;\n      color: #2f4a3a;\n      animation: flUp .6s ease both;\n      animation-delay: .16s;\n    }\n\n    .trip-card {\n      position: relative;\n      background: #fff;\n      border-radius: 20px;\n      padding: 15px 18px 16px;\n      margin-top: 13px;\n      box-shadow: 0 6px 20px rgba(57,71,59,.08);\n      transition: transform .2s, box-shadow .2s;\n      overflow: hidden;\n    }\n    .trip-card:hover { transform: translateY(-3px); }\n    .trip-card.is-now { box-shadow: 0 6px 24px rgba(91,138,95,.24); }\n\n    .trip-accent {\n      position: absolute;\n      left: 0; top: 0; bottom: 0;\n      width: 5px;\n      background: var(--accent, #5b8a5f);\n      border-radius: 0 4px 4px 0;\n    }\n    /* Live trip: the tab widens and pulses to pull the eye. */\n    .trip-accent.is-now {\n      width: 7px;\n      animation: nowGlow 1.8s ease-in-out infinite;\n    }\n    .trip-notch {\n      position: absolute;\n      left: -7px; top: 50%;\n      width: 14px; height: 14px;\n      border-radius: 50%;\n      background: #fdf8ee;\n      transform: translateY(-50%);\n    }\n\n    .trip-inner {\n      display: flex;\n      align-items: center;\n      gap: 14px;\n      padding-left: 8px;\n    }\n    .trip-flag {\n      width: 54px; height: 54px;\n      border-radius: 16px;\n      background: #eef3e8;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      font-size: 28px;\n      flex: none;\n    }\n    .trip-info { flex: 1; min-width: 0; }\n\n    /* Eyebrow row: convention name + status badge live together here, so the\n       badge never competes with the date line (fixes CJK badge clipping). */\n    .trip-con-row {\n      display: flex;\n      align-items: center;\n      gap: 10px;\n    }\n    .trip-con {\n      display: inline-flex;\n      align-items: center;\n      gap: 6px;\n      flex: 1 1 auto;\n      min-width: 0;\n      font: 800 12.5px/1.1 'Nunito Sans', sans-serif;\n      letter-spacing: .06em;\n      text-transform: uppercase;\n      color: var(--accent, #5b8a5f);\n    }\n    .trip-con svg { flex: none; }\n    .trip-con > span {\n      overflow: hidden;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n    }\n    .trip-badge {\n      flex: none;\n      margin-left: auto;\n      white-space: nowrap;\n      font: 800 9.5px/1 'Nunito Sans', sans-serif;\n      letter-spacing: .05em;\n      color: #fff;\n      border-radius: 20px;\n      padding: 4px 9px;\n    }\n    .trip-badge-next { background: #e08a4f; }\n    .trip-badge-now {\n      background: var(--accent, #5b8a5f);\n      animation: nowBadge 1.8s ease-in-out infinite;\n    }\n\n    .trip-city {\n      font-family: 'Fredoka', sans-serif;\n      font-weight: 600;\n      font-size: 20px;\n      line-height: 1.15;\n      color: #2f4a3a;\n      margin-top: 4px;\n    }\n    /* Date + live status wrap onto their own line so nothing truncates. */\n    .trip-meta {\n      display: flex;\n      flex-wrap: wrap;\n      align-items: center;\n      gap: 5px 10px;\n      margin-top: 7px;\n    }\n    .trip-range { font-size: 13px; color: #6f7a67; }\n\n    /* ── status messages (loading / empty / error) ── */\n    .trip-msg {\n      margin-top: 13px;\n      text-align: center;\n      font-size: 13.5px;\n      line-height: 1.5;\n      color: #8a937e;\n      background: #fff;\n      border-radius: 20px;\n      padding: 18px;\n      box-shadow: 0 6px 20px rgba(57,71,59,.08);\n    }\n    .trip-msg code {\n      font: 600 12px ui-monospace, monospace;\n      color: #56624f;\n      background: #eef3e8;\n      border-radius: 6px;\n      padding: 1px 5px;\n    }\n    .trip-when {\n      font: 700 11.5px/1 'Nunito Sans';\n      color: var(--accent, #5b8a5f);\n      background: #e7f0e2;\n      border-radius: 20px;\n      padding: 5px 10px;\n      white-space: nowrap;\n      flex: none;\n    }\n\n    /* ── photos: compact horizontal snapshot strip ── */\n    .photos-heading {\n      margin: 30px 0 0;\n      font-family: 'Fredoka', sans-serif;\n      font-weight: 600;\n      font-size: 23px;\n      color: #2f4a3a;\n      animation: flUp .6s ease both;\n      animation-delay: .12s;\n    }\n    .photo-strip {\n      display: flex;\n      gap: 12px;\n      margin-top: 11px;\n      overflow-x: auto;\n      scroll-snap-type: x mandatory;\n      padding-bottom: 8px;\n      scrollbar-width: thin;\n      scrollbar-color: rgba(91,138,95,.35) transparent;\n    }\n    .photo-card {\n      flex: none;\n      width: 186px;\n      scroll-snap-align: start;\n      background: #fff;\n      border-radius: 16px;\n      overflow: hidden;\n      box-shadow: 0 6px 20px rgba(57,71,59,.08);\n      transition: transform .2s, box-shadow .2s;\n    }\n    .photo-card:hover { transform: translateY(-3px); }\n    .photo-img {\n      position: relative;\n      aspect-ratio: 1;\n      background: #ece3d2;\n      background-image: repeating-linear-gradient(45deg,\n        rgba(91,138,95,.18) 0 8px, transparent 8px 16px);\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      font: 600 10px ui-monospace, monospace;\n      color: #7e8a72;\n    }\n    .photo-img img {\n      position: absolute;\n      inset: 0;\n      width: 100%;\n      height: 100%;\n      object-fit: cover;\n    }\n    .photo-body { padding: 10px 12px 11px; }\n    .photo-desc {\n      margin: 0;\n      font-size: 12.5px;\n      line-height: 1.45;\n      color: #56624f;\n      display: -webkit-box;\n      -webkit-line-clamp: 2;\n      -webkit-box-orient: vertical;\n      overflow: hidden;\n    }\n    .photo-credit {\n      display: flex;\n      align-items: center;\n      gap: 5px;\n      margin-top: 6px;\n      font-size: 11px;\n      color: #8a937e;\n    }\n    .photo-credit .pc-icon { font-size: 12px; line-height: 1; }\n    .photo-credit a {\n      color: var(--accent, #5b8a5f);\n      font-weight: 700;\n      text-decoration: none;\n    }\n    .photo-credit a:hover { text-decoration: underline; }\n    .photo-note {\n      text-align: center;\n      font-size: 11.5px;\n      line-height: 1.5;\n      color: #8a937e;\n      margin-top: 2px;\n    }\n    .photo-note code {\n      font: 600 10.5px ui-monospace, monospace;\n      color: #56624f;\n      background: #eef3e8;\n      border-radius: 6px;\n      padding: 1px 5px;\n    }\n\n    /* ── footer ── */\n    .footer {\n      text-align: center;\n      margin-top: 28px;\n      font-size: 12.5px;\n      color: #7d8676;\n    }\n    /* Machine-translation disclaimer — a small pill on the left, under the\n       language switcher, non-English languages only. */\n    .mt-note {\n      margin: -8px 0 16px;\n    }\n    .mt-note[hidden] { display: none; }\n    .mt-pill {\n      display: inline-flex;\n      align-items: center;\n      gap: 5px;\n      font-size: 10px;\n      line-height: 1.3;\n      color: #8a937e;\n      background: rgba(255,255,255,.55);\n      border: 1px solid rgba(91,138,95,.15);\n      border-radius: 12px;\n      padding: 3px 9px;\n    }\n\n    /* ── mobile polish ── */\n    @media (max-width: 400px) {\n      .trip-inner { gap: 12px; }\n      .trip-flag  { width: 48px; height: 48px; font-size: 25px; }\n      .trip-city  { font-size: 18px; }\n      .bio        { font-size: 14.5px; }\n    }\n\n    /* Respect users who prefer less motion — drop drift, glow & entrances. */\n    @media (prefers-reduced-motion: reduce) {\n      *,\n      *::before,\n      *::after {\n        animation-duration: .001ms !important;\n        animation-iteration-count: 1 !important;\n        transition-duration: .001ms !important;\n      }\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n  <div class=\"page\">\n    <div class=\"blob blob-1\"><\u002Fdiv>\n    <div class=\"blob blob-2\"><\u002Fdiv>\n    <div class=\"blob blob-3\"><\u002Fdiv>\n\n    <div class=\"content\">\n\n      <!-- LANGUAGE -->\n      <div class=\"lang-switch\" role=\"group\" aria-label=\"Language / 语言 / 言語\">\n        <button type=\"button\" data-lang=\"en\" lang=\"en\">EN<\u002Fbutton>\n        <button type=\"button\" data-lang=\"zh\" lang=\"zh-Hans\">中文<\u002Fbutton>\n        <button type=\"button\" data-lang=\"ja\" lang=\"ja\">日本語<\u002Fbutton>\n        <button type=\"button\" data-lang=\"id\" lang=\"id\">Bahasa<\u002Fbutton>\n        <button type=\"button\" data-lang=\"th\" lang=\"th\">ไทย<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"lang-subrow\">\n        <div class=\"mt-note\" id=\"mt-note\" hidden=\"\">\n          <span class=\"mt-pill\"><span aria-hidden=\"true\">🌐<\u002Fspan><span id=\"mt-note-text\"><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"variant-switch\" role=\"group\" aria-label=\"Regional variant\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- HERO -->\n      <div class=\"hero\">\n        <div class=\"avatar\" id=\"avatar\">photo<\u002Fdiv>\n        <h1 class=\"name\">Riley 🦌<\u002Fh1>\n        <p class=\"bio\" data-i18n=\"bio\">Hey! I'm Riley, a deer living in Singapore 🇸🇬 I love traveling and meeting new friends wherever the road takes me. Hope our paths can cross someday! 🌿<\u002Fp>\n        <a class=\"fursuit-credit\" href=\"https://www.animagusstudios.com/\" target=\"_blank\" rel=\"noopener noreferrer\">\n          <span class=\"fc-icon\" aria-hidden=\"true\">🧵<\u002Fspan>\n          <span><span data-i18n=\"fursuitBy\">Fursuit by<\u002Fspan> <strong>Animagus Studios<\u002Fstrong><\u002Fspan>\n          <svg class=\"fc-arrow\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M7 17 17 7M9 7h8v8\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n      <\u002Fdiv>\n\n      <!-- SOCIALS -->\n      <div class=\"socials\">\n        <a href=\"https://x.com/riley_the_deer\" target=\"_blank\" rel=\"noopener noreferrer\" class=\"social-btn social-btn-x\">\n          <svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"currentColor\" aria-hidden=\"true\">\n            <path d=\"M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z\"><\u002Fpath>\n          <\u002Fsvg>\n          <span data-i18n=\"x\">Follow on X<\u002Fspan>\n        <\u002Fa>\n        <a href=\"https://t.me/rileythedeer\" target=\"_blank\" rel=\"noopener noreferrer\" class=\"social-btn social-btn-tg\">\n          <svg viewBox=\"0 0 24 24\" width=\"19\" height=\"19\" aria-hidden=\"true\">\n            <pat           photo: 'foto',\n          photosHeading: 'Foto 📸',\n          photoBy: function (name) { return 'Foto oleh ' + name; },\n          photosSetup: 'Foto contoh — tambahkan tab “Photos” dalam sheet untuk memaparkan foto anda sendiri.',\n          mtNote: 'Terjemahan mesin — mungkin kurang tepat',\n        },\n        th: {\n          locale: 'th-TH', htmlLang: 'th',\n          bio: 'สวัสดี! เราชื่อ Riley เป็นกวางที่อาศัยอยู่ในสิงคโปร์ 🇸🇬 เราชอบเที่ยวและชอบทำความรู้จักเพื่อนใหม่ทุกที่ที่ได้ไป หวังว่าสักวันเราจะได้เจอกันนะ! 🌿',\n          x: 'ติดตามบน X',\n          telegram: 'ทักมาคุยกันที่ Telegram',\n          bluesky: 'ตามเราได้ที่ Bluesky',\n          headed: 'ทริปต่อไปของเรา ✈️',\n          homeBase: '📍 พำนักอยู่ที่สิงคโปร์',\n          now: 'ตอนนี้', next: 'เร็ว ๆ นี้',\n          happeningNow: 'กำลังจัดขึ้น', today: 'วันนี้', tomorrow: 'พรุ่งนี้',\n          inDays: function (n) { return 'อีก ' + n + ' วัน'; },\n          loading: 'กำลังโหลดทริป…',\n          empty: 'ยังไม่มีทริปใหม่ตอนนี้ — ไว้แวะมาดูใหม่นะ! 🌿',\n          error: 'โหลดตารางการเดินทางไม่ได้ในตอนนี้ กรุณาตรวจสอบว่าชีตถูกแชร์เป็น “ทุกคนที่มีลิงก์”',\n          langHeading: 'ภาษาที่พูดได้ 💬',\n          fursuitBy: 'Fursuit โดย',\n          langEnglish: 'อังกฤษ', langChinese: 'จีน',\n          levelNative: 'ภาษาแม่', levelConversational: 'พอคุยได้',\n          photo: 'รูปภาพ',\n          photosHeading: 'รูปภาพ 📸',\n          photoBy: function (name) { return 'ถ่ายโดย ' + name; },\n          photosSetup: 'รูปตัวอย่าง — เพิ่มแท็บ “Photos” ในชีตเพื่อแสดงรูปของคุณเอง',\n          mtNote: 'แปลด้วยเครื่อง อาจคลาดเคลื่อน',\n        },\n      };\n\n      // City-name localisation. Any city not listed falls back to the sheet's\n      // original spelling, so new destinations still work untranslated.\n      const CITY_NAMES = {\n        'singapore':    { zh: '新加坡', zhHant: '新加坡', ja: 'シンガポール', id: 'Singapura',    ms: 'Singapura',    th: 'สิงคโปร์' },\n        'jakarta':      { zh: '雅加达', zhHant: '雅加達', ja: 'ジャカルタ',   id: 'Jakarta',      ms: 'Jakarta',      th: 'จาการ์ตา' },\n        'osaka':        { zh: '大阪',   zhHant: '大阪',   ja: '大阪',         id: 'Osaka',        ms: 'Osaka',        th: 'โอซากะ' },\n        'kuala lumpur': { zh: '吉隆坡', zhHant: '吉隆坡', ja: 'クアラルンプール', id: 'Kuala Lumpur', ms: 'Kuala Lumpur', th: 'กัวลาลัมเปอร์' },\n        'tokyo':        { zh: '东京',   zhHant: '東京',   ja: '東京',         id: 'Tokyo',        ms: 'Tokyo',        th: 'โตเกียว' },\n        'bangkok':      { zh: '曼谷',   zhHant: '曼谷',   ja: 'バンコク',     id: 'Bangkok',      ms: 'Bangkok',      th: 'กรุงเทพฯ' },\n        'hong kong':    { zh: '香港',   zhHant: '香港',   ja: '香港',         id: 'Hong Kong',    ms: 'Hong Kong',    th: 'ฮ่องกง' },\n        'taipei':       { zh: '台北',   zhHant: '台北',   ja: '台北',         id: 'Taipei',       ms: 'Taipei',       th: 'ไทเป' },\n        'seoul':        { zh: '首尔',   zhHant: '首爾',   ja: 'ソウル',       id: 'Seoul',        ms: 'Seoul',        th: 'โซล' },\n      };\n      function translateCity(city) {\n        const entry = CITY_NAMES[String(city || '').trim().toLowerCase()];\n        return (entry && entry[lang]) ? entry[lang] : city;\n      }\n\n      // Language groups that offer regional variants. The top-bar button opens\n      // the group; a secondary toggle switches the specific variant.\n      const VARIANTS = {\n        zh: [ { code: 'zh', label: '简体' }, { code: 'zhHant', label: '繁體' } ],\n        id: [ { code: 'id', label: 'Indonesia' }, { code: 'ms', label: 'Melayu' } ],\n      };\n      // Map any variant code back to its top-bar group button.\n      function groupKey(code) {\n        if (code === 'zh' || code === 'zhHant') return 'zh';\n        if (code === 'id' || code === 'ms') return 'id';\n        return code;\n      }\n\n      // Default language: a saved choice, else the browser's preference, else English.\n      function detectLang() {\n        try {\n          const saved = localStorage.getItem('riley-lang');\n          if (saved && I18N[saved]) return saved;\n        } catch (e) { /* storage may be blocked */ }\n        const navs = navigator.languages || [navigator.language || 'en'];\n        for (let i = 0; i < navs.length; i++) {\n          const low = String(navs[i]).toLowerCase();\n          if (low.indexOf('zh') === 0) {\n            return (low.indexOf('hant') > -1 || low.indexOf('-tw') > -1 ||\n                    low.indexOf('-hk') > -1 || low.indexOf('-mo') > -1) ? 'zhHant' : 'zh';\n          }\n          if (low.indexOf('ja') === 0) return 'ja';\n          if (low.indexOf('ms') === 0) return 'ms';\n          if (low.indexOf('id') === 0) return 'id';\n          if (low.indexOf('th') === 0) return 'th';\n          if (low.indexOf('en') === 0) return 'en';\n        }\n        return 'en';\n      }\n\n      let lang = detectLang();\n      let t = I18N[lang];        // active dictionary (reassigned by setLang)\n      let lastRows = null;       // last data rendered, so we can re-render on switch\n\n      // Sample data shown until SHEET_ID is configured, so the page never\n      // looks empty while you set things up.\n      const SAMPLE_ROWS = [\n        { con: 'IWAG', city: 'Jakarta', flag: '🇮🇩', start: '2026-07-03', end: '2026-07-07' },\n        { con: 'OFFF', city: 'Osaka',   flag: '🇯🇵', start: '2026-07-25', end: '2026-08-03' },\n      ];\n\n      function esc(s) {\n        return String(s == null ? '' : s)\n          .replace(/&/g, '&amp;').replace(/<\u002Fg, '&lt;').replace(/>/g, '&gt;');\n      }\n\n      function fmt(d) {\n        return d.toLocaleDateString(t.locale, { month: 'short', day: 'numeric' });\n      }\n\n      // Swap the placeholder for a real photo only once it has successfully\n      // loaded — a missing/broken URL leaves the styled placeholder in place.\n      function setAvatar(url) {\n        url = String(url || '').trim();\n        const el = document.getElementById('avatar');\n        if (!el || !url) return;\n        const img = new Image();\n        img.onload = function () {\n          el.textContent = '';\n          el.style.backgroundImage = 'url(\"' + url.replace(/\"/g, '%22') + '\")';\n          el.style.backgroundSize = 'cover';\n          el.style.backgroundPosition = 'center';\n        };\n        img.onerror = function () { console.warn('[avatar] could not load photo:', url); };\n        img.src = url;\n      }\n\n      // Accepts 2026-07-03 (ISO) or 7/3/2026 (US). endOfDay pins to 23:59:59\n      // so an event stays visible through the whole of its final day.\n      function parseDate(str, endOfDay) {\n        str = String(str || '').trim();\n        let y, m, d;\n        const iso = /^(\\d{4})-(\\d{1,2})-(\\d{1,2})$/.exec(str);\n        const us  = /^(\\d{1,2})\\/(\\d{1,2})\\/(\\d{4})$/.exec(str);\n        if (iso)      { y = +iso[1]; m = +iso[2]; d = +iso[3]; }\n        else if (us)  { m = +us[1];  d = +us[2];  y = +us[3]; }\n        else {\n          const dt = new Date(str);\n          return isNaN(dt) ? null : dt;\n        }\n        return new Date(y, m - 1, d, endOfDay ? 23 : 0, endOfDay ? 59 : 0, endOfDay ? 59 : 0);\n      }\n\n      // Build a trip view-model. Returns null for rows that can't be parsed\n      // or whose end date is already in the past (auto-removed).\n      function buildTrip(row) {\n        const start = parseDate(row.start, false);\n        const end   = parseDate(row.end,   true);\n        if (!start || !end) return null;\n\n        const now  = new Date();\n        if (now > end) return null;            // event finished → drop it\n\n        const days = Math.ceil((start - now) / 86400000);\n        let status, when;\n        if (now >= start)    { status = 'now'; when = t.happeningNow; }\n        else if (days <= 0)  { status = 'up';  when = t.today; }\n        else if (days === 1) { status = 'up';  when = t.tomorrow; }\n        else                 { status = 'up';  when = t.inDays(days); }\n\n        const range = fmt(start) + ' – ' + fmt(end) + ', ' + end.getFullYear();\n        return {\n          con: row.con, city: row.city, flag: row.flag,\n          range: range, when: when, status: status, start: start, isNext: false,\n        };\n      }\n\n      function render(rows) {\n        lastRows = rows;   // remember so a language switch can re-render\n\n        // Profile photo is sheet-wide: use the first non-empty Photo cell.\n        const withPhoto = rows.find(function (r) { return r.photo && r.photo.trim(); });\n        setAvatar(withPhoto && withPhoto.photo);\n\n        const trips = rows.map(buildTrip).filter(Boolean);\n        trips.sort(function (a, b) { return a.start - b.start; });\n\n        // First still-upcoming trip (not already happening) gets the NEXT tag.\n        let marked = false;\n        trips.forEach(function (trip) {\n          if (!marked && trip.status === 'up') { trip.isNext = true; marked = true; }\n        });\n\n        container.innerHTML = '';\n\n        if (!trips.length) {\n          container.removeAttribute('role');\n          container.innerHTML = '<div class=\"trip-msg\">' + esc(t.empty) + '<\u002Fdiv>';\n          return;\n        }\n\n        container.setAttribute('role', 'list');\n\n        trips.forEach(function (trip) {\n          const isNow = trip.status === 'now';\n          const cityName = translateCity(trip.city);\n          let badge = '';\n          if (isNow)            badge = '<span class=\"trip-badge trip-badge-now\">'  + esc(t.now)  + '<\u002Fspan>';\n          else if (trip.isNext) badge = '<span class=\"trip-badge trip-badge-next\">' + esc(t.next) + '<\u002Fspan>';\n\n          const el = document.createElement('div');\n          el.className = 'trip-card' + (isNow ? ' is-now' : '');\n          el.setAttribute('role', 'listitem');\n          // Full spoken summary for screen readers (badge/colour aren't enough).\n          el.setAttribute('aria-label',\n            trip.con + ' \\u2014 ' + cityName + '. ' + trip.range + '. ' + trip.when + '.');\n          el.innerHTML =\n            '<div class=\"trip-accent' + (isNow ? ' is-now' : '') + '\"><\u002Fdiv>' +\n            '<div class=\"trip-notch\"><\u002Fdiv>' +\n            '<div class=\"trip-inner\">' +\n              '<div class=\"trip-flag\" aria-hidden=\"true\">' + esc(trip.flag) + '<\u002Fdiv>' +\n              '<div class=\"trip-info\">' +\n                '<div class=\"trip-con-row\">' +\n                  '<span class=\"trip-con\">' + TICKET_ICON + '<span>' + esc(trip.con) + '<\u002Fspan><\u002Fspan>' +\n                  badge +\n                '<\u002Fdiv>' +\n                '<div class=\"trip-city\">' + esc(cityName) + '<\u002Fdiv>' +\n                '<div class=\"trip-meta\">' +\n                  '<span class=\"trip-range\">' + esc(trip.range) + '<\u002Fspan>' +\n                  '<span class=\"trip-when\">' + esc(trip.when) + '<\u002Fspan>' +\n                '<\u002Fdiv>' +\n              '<\u002Fdiv>' +\n            '<\u002Fdiv>';\n          container.appendChild(el);\n        });\n      }\n\n      function showMsg(html) { container.removeAttribute('role'); container.innerHTML = '<div class=\"trip-msg\">' + html + '<\u002Fdiv>'; }\n\n      // ── PHOTOS ────────────────────────────────────────────────────\n      //  Reads a second tab named \"Photos\" from the SAME sheet.\n      //  Expected columns (header row, any order):\n      //     Photo | Description | Credit | Link\n      //     https://…/pic.jpg | Golden hour at the Marina | Alex Tan | https://x.com/alextan\n      //  Photo must be a DIRECT image URL (same rule as the avatar).\n      //  Link (optional) makes the photographer's name clickable.\n      //  Until that tab exists, sample cards + a setup note are shown.\n      const PHOTOS_TAB = 'Photos';\n      const photosEl = document.getElementById('photos');\n      const photosNoteEl = document.getElementById('photos-note');\n      let lastPhotoRows = null;\n      let photosState = 'loading';   // 'loading' | 'data' | 'samples'\n\n      const SAMPLE_PHOTOS = [\n        { photo: '', desc: 'Golden hour wander along the Marina — home turf. 🌿', credit: 'Alex Tan', link: '' },\n        { photo: '', desc: 'Group shot from last year’s con meetup!', credit: '@shutterfox', link: '' },\n      ];\n\n      function escAttr(s) { return esc(s).replace(/\"/g, '&quot;'); }\n\n      function renderPhotos(rows) {\n        lastPhotoRows = rows;\n        photosState = 'data';\n        photosEl.innerHTML = '';\n        photosNoteEl.innerHTML = '';\n        rows.forEach(function (p) {\n          const card = document.createElement('div');\n          card.className = 'photo-card';\n          // Striped placeholder stays visible until the image loads;\n          // a broken URL removes the <img>, revealing the placeholder.\n          let html = '<div class=\"photo-img\"><span>' + esc(t.photo) + '<\u002Fspan>';\n          if (p.photo) {\n            html += '<img src=\"' + escAttr(p.photo) + '\" alt=\"' + escAttr(p.desc) + '\" loading=\"lazy\" onerror=\"this.remove()\">';\n          }\n          html += '<\u002Fdiv><div class=\"photo-body\">';\n          if (p.desc) html += '<p class=\"photo-desc\">' + esc(p.desc) + '<\u002Fp>';\n          if (p.credit) {\n            const name = p.link\n              ? '<a href=\"' + escAttr(p.link) + '\" target=\"_blank\" rel=\"noopener noreferrer\">' + esc(p.credit) + '<\u002Fa>'\n              : esc(p.credit);\n            html += '<div class=\"photo-credit\"><span class=\"pc-icon\" aria-hidden=\"true\">📷<\u002Fspan><span>' + t.photoBy(name) + '<\u002Fspan><\u002Fdiv>';\n          }\n          html += '<\u002Fdiv>';\n          card.innerHTML = html;\n          photosEl.appendChild(card);\n        });\n      }\n\n      function renderPhotoSamples() {\n        renderPhotos(SAMPLE_PHOTOS);\n        photosState = 'samples';\n        photosNoteEl.innerHTML = '<div class=\"photo-note\">' + esc(t.photosSetup) +\n          '<br><code>Photo | Description | Credit | Link<\u002Fcode><\u002Fdiv>';\n      }\n\n      function photoRowsFromCSV(text) {\n        const grid = parseCSV(text).filter(function (r) {\n          return r.some(function (c) { return c.trim() !== ''; });\n        });\n        if (grid.length < 2) return [];\n        const headers = grid[0].map(function (h) { return h.trim().toLowerCase(); });\n        const col = function (name) { return headers.indexOf(name); };\n        const ci = {\n          photo:  col('photo'),\n          desc:   col('description'),\n          credit: col('credit'),\n          link:   col('link'),\n        };\n        // Guard: if this doesn't look like a Photos tab, treat as unconfigured.\n        if (ci.desc < 0 && ci.credit < 0) return [];\n        const at = function (r, i) { return i >= 0 && r[i] != null ? r[i].trim() : ''; };\n        return grid.slice(1).map(function (r) {\n          return { photo: at(r, ci.photo), desc: at(r, ci.desc), credit: at(r, ci.credit), link: at(r, ci.link) };\n        }).filter(function (p) { return p.photo || p.desc; });\n      }\n\n      function loadPhotos() {\n        const url = 'https://docs.google.com/spreadsheets/d/' +\n                    encodeURIComponent(SHEET_ID) + '/gviz/tq?tqx=out:csv&sheet=' +\n                    encodeURIComponent(PHOTOS_TAB);\n        fetch(url)\n          .then(function (res) {\n            if (!res.ok) throw new Error('HTTP ' + res.status);\n            return res.text();\n          })\n          .then(function (text) {\n            const rows = photoRowsFromCSV(text);\n            if (rows.length) renderPhotos(rows);\n            else if (photosState !== 'data') renderPhotoSamples();\n          })\n          .catch(function (err) {\n            console.info('[photos] could not load the \"' + PHOTOS_TAB + '\" tab — add one with columns: Photo | Description | Credit | Link.', err);\n            if (photosState !== 'data') renderPhotoSamples();\n          });\n      }\n\n      // ── apply the active language to the static chrome + switch buttons ──\n      function applyStatic() {\n        document.documentElement.lang = t.htmlLang;\n        const nodes = document.querySelectorAll('[data-i18n]');\n        for (let i = 0; i < nodes.length; i++) {\n          const key = nodes[i].getAttribute('data-i18n');\n          if (t[key] != null) nodes[i].textContent = t[key];\n        }\n        // Avatar placeholder text — only while no photo has replaced it.\n        const av = document.getElementById('avatar');\n        if (av && !av.style.backgroundImage) av.textContent = t.photo;\n        // Machine-translation disclaimer — shown for every non-English language.\n        const mt = document.getElementById('mt-note');\n        const mtText = document.getElementById('mt-note-text');\n        if (mt && mtText) {\n          if (t.mtNote) { mtText.textContent = t.mtNote; mt.hidden = false; }\n          else { mtText.textContent = ''; mt.hidden = true; }\n        }\n        // Reflect the selection: the top bar highlights the active GROUP…\n        const cur = groupKey(lang);\n        const btns = document.querySelectorAll('.lang-switch button');\n        for (let i = 0; i < btns.length; i++) {\n          btns[i].setAttribute('aria-pressed',\n            groupKey(btns[i].getAttribute('data-lang')) === cur ? 'true' : 'false');\n        }\n        renderVariants();   // …and the secondary toggle shows this group's variants\n      }\n\n      // Build the variant sub-toggle (简体/繁體, Indonesia/Melayu) for the active\n      // group; hidden entirely for groups that have no regional variants.\n      function renderVariants() {\n        const host = document.querySelector('.variant-switch');\n        if (!host) return;\n        const variants = VARIANTS[groupKey(lang)];\n        host.innerHTML = '';\n        if (!variants) { host.style.display = 'none'; return; }\n        host.style.display = 'flex';\n        variants.forEach(function (v) {\n          const b = document.createElement('button');\n          b.type = 'button';\n          b.textContent = v.label;\n          b.setAttribute('lang', v.code === 'zhHant' ? 'zh-Hant' : (v.code === 'zh' ? 'zh-Hans' : v.code));\n          b.setAttribute('aria-pressed', v.code === lang ? 'true' : 'false');\n          b.addEventListener('click', function () { setLang(v.code); });\n          host.appendChild(b);\n        });\n      }\n\n      function setLang(newLang) {\n        if (!I18N[newLang]) return;\n        lang = newLang;\n        t = I18N[lang];\n        try { localStorage.setItem('riley-lang', lang); } catch (e) { /* ignore */ }\n        applyStatic();\n        if (lastRows) render(lastRows);       // re-render trips in the new language\n        else showMsg(esc(t.loading));         // data not in yet\n        if (photosState === 'data') renderPhotos(lastPhotoRows);\n        else if (photosState === 'samples') renderPhotoSamples();\n      }\n\n      const switchBtns = document.querySelectorAll('.lang-switch button');\n      for (let i = 0; i < switchBtns.length; i++) {\n        switchBtns[i].addEventListener('click', function () {\n          const code = this.getAttribute('data-lang');\n          // Re-clicking the current group keeps the chosen variant; otherwise\n          // switch to that group's default variant (its data-lang value).\n          if (groupKey(code) === groupKey(lang)) return;\n          setLang(code);\n        });\n      }\n\n      applyStatic();   // set initial-language chrome before any data loads\n\n      // ── CSV parsing (handles quoted fields, embedded commas/quotes) ──\n      function parseCSV(text) {\n        const rows = [];\n        let row = [], field = '', inQ = false;\n        for (let i = 0; i < text.length; i++) {\n          const c = text[i];\n          if (inQ) {\n            if (c === '\"') {\n              if (text[i + 1] === '\"') { field += '\"'; i++; }\n              else inQ = false;\n            } else field += c;\n          } else if (c === '\"') inQ = true;\n          else if (c === ',') { row.push(field); field = ''; }\n          else if (c === '\\r') { /* ignore */ }\n          else if (c === '\\n') { row.push(field); rows.push(row); row = []; field = ''; }\n          else field += c;\n        }\n        if (field !== '' || row.length) { row.push(field); rows.push(row); }\n        return rows;\n      }\n\n      // Map sheet rows onto our column names via the header row (case-insensitive).\n      function rowsFromCSV(text) {\n        const grid = parseCSV(text).filter(function (r) {\n          return r.some(function (c) { return c.trim() !== ''; });\n        });\n        if (grid.length < 2) return [];\n        const headers = grid[0].map(function (h) { return h.trim().toLowerCase(); });\n        const col = function (name) { return headers.indexOf(name); };\n        const ci = {\n          con:   col('convention'),\n          city:  col('city'),\n          flag:  col('flag'),\n          start: col('start'),\n          end:   col('end'),\n          photo: col('photo'),\n        };\n        const at = function (r, i) { return i >= 0 && r[i] != null ? r[i].trim() : ''; };\n        return grid.slice(1).map(function (r) {\n          return {\n            con:   at(r, ci.con),\n            city:  at(r, ci.city),\n            flag:  at(r, ci.flag),\n            start: at(r, ci.start),\n            end:   at(r, ci.end),\n            photo: at(r, ci.photo),\n          };\n        });\n      }\n\n      let loaded = false;   // have we ever rendered real data?\n\n      // silent=true (used by auto-refresh) keeps existing cards on screen:\n      // no \"Loading…\" flash, and a transient fetch error is logged rather\n      // than replacing good data with an error message.\n      function loadFromSheet(silent) {\n        let url = 'https://docs.google.com/spreadsheets/d/' +\n                  encodeURIComponent(SHEET_ID) + '/gviz/tq?tqx=out:csv';\n        if (SHEET_TAB) url += '&sheet=' + encodeURIComponent(SHEET_TAB);\n\n        if (!silent) showMsg(esc(t.loading));\n        fetch(url)\n          .then(function (res) {\n            if (!res.ok) throw new Error('HTTP ' + res.status);\n            return res.text();\n          })\n          .then(function (text) { render(rowsFromCSV(text)); loaded = true; })\n          .catch(function (err) {\n            console.error('[trips] failed to load sheet:', err);\n            if (!loaded) showMsg(esc(t.error));\n          });\n      }\n\n      if (!SHEET_ID || SHEET_ID === 'PASTE_YOUR_SHEET_ID_HERE') {\n        console.info('[trips] SHEET_ID not set — showing sample data. ' +\n                     'Edit SHEET_ID in index.html to load from your Google Sheet.');\n        render(SAMPLE_ROWS);\n        renderPhotoSamples();\n      } else {\n        loadFromSheet(false);\n        loadPhotos();\n        if (REFRESH_MINUTES > 0) {\n          // Re-pull on a timer, and also the moment the tab regains focus\n          // (a laptop waking from sleep, switching back to the tab) so it\n          // never shows stale data after a long idle period.\n          setInterval(function () { loadFromSheet(true); loadPhotos(); }, REFRESH_MINUTES * 60000);\n          document.addEventListener('visibilitychange', function () {\n            if (!document.hidden) { loadFromSheet(true); loadPhotos(); }\n          });\n        }\n      }\n    })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
